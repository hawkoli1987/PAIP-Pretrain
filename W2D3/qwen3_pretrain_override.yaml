# To override a parameter, ensure the structure matches the ConfigContainer
# and its sub-configurations (e.g., model, train, etc.)
# Top-level ConfigContainer fields are dataclasses themselves

model:
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  pipeline_dtype: torch.bfloat16
  context_parallel_size: 1
  expert_model_parallel_size: 1
  sequence_parallel: false
  seq_length: 1024
  # Activation recomputation
  # See megatron-lm/megatron/core/transformer/transformer_config.py for explanation of parameters
  # Options are None (default), "full", "selective". Comment out next line to disable activation recomputation.
  # recompute_granularity: "full"
  # Options are None (default), "uniform", "block"
  recompute_method: "uniform"
  # Options are None (default) or an integer. 
  # Set to null if recompute_granularity is selective
  recompute_num_layers: 1
  # Set to true to enable CPU offloading. This currently produces a ListIndexOutOfRange error.
  cpu_offloading: false
  cpu_offloading_num_layers: 10

train:
  train_iters: 10
  global_batch_size: 32
  micro_batch_size: 1
  eval_interval: 100
  # The total number of samples used for evaluation will be equal to 
  # global_batch_size * eval_iters
  eval_iters: 2

optimizer:
  optimizer: adam
  lr: 0.0001
  min_lr: 0.00001
  clip_grad: 1.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1e-5
  use_distributed_optimizer: false
  # Muon settings
  muon_momentum: 0.9
  muon_use_nesterov: true
  muon_scale_mode: spectral
  muon_fp32_matmul_prec: medium
  muon_num_ns_steps: 5
  muon_tp_mode: distributed


scheduler:
  lr_warmup_iters: 5

checkpoint:
  # Directory to save to. If null, no checkpoint will be saved.
  save: null
  fully_parallel_save: true
  ckpt_step: null
  load: null
  # Only enable if using Megatron FSDP
  # ckpt_format: fsdp_dtensor
  # load_optim: false
  # load_rng: false

dist:
  use_megatron_fsdp: false
  use_torch_fsdp2: false

logger:
  log_interval: 1
  log_throughput: true
  log_progress: true
  # wandb_project: test-muon
  # wandb_exp_name: qwen-muon
  # wandb_entity: joc
  # wandb_save_dir: wandb

dataset:
  # Must be equal to model.seq_length
  sequence_length: 1024

rng:
  seed: 1234

ddp:
  grad_reduce_in_fp32: true 
  overlap_param_gather: true
  overlap_grad_reduce: true
  use_distributed_optimizer: false
  data_parallel_sharding_strategy: "no_shard"

profiling:
  # For optional fields in the config, specify the target to instantiate the object.
  _target_: megatron.bridge.training.config.ProfilingConfig
  use_nsys_profiler: false
  profile_step_start: 9
  profile_step_end: 10
  use_pytorch_profiler: false
  profile_ranks: [0, 1]
  record_shapes: true
